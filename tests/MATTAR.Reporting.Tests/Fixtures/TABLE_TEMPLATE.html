<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Invoice {{ Number }}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2em; color: #222; }
    h1 { color: #2c3e50; }
    p { margin: 0.25em 0; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1.5em;
    }
    thead {
      background-color: #2c3e50;
      color: #ffffff;
    }
    thead th {
      padding: 0.6em 0.8em;
      text-align: left;
      font-weight: bold;
      border: 1px solid #1a252f;
    }
    tbody tr:nth-child(even) { background-color: #f2f2f2; }
    tbody tr:nth-child(odd)  { background-color: #ffffff; }
    tbody td {
      padding: 0.5em 0.8em;
      border: 1px solid #ccc;
      vertical-align: top;
    }
    tbody td.numeric { text-align: right; }
    tfoot {
      background-color: #ecf0f1;
      font-weight: bold;
    }
    tfoot td {
      padding: 0.5em 0.8em;
      border: 1px solid #ccc;
    }
    tfoot td.numeric { text-align: right; }
  </style>
</head>
<body>
  <h1>Invoice N° {{ Number }}</h1>
  <p>Client: {{ Name }}</p>
  <p>Date: {{ Date }}</p>

  <table>
    <thead>
      <tr>
        <th>Description</th>
        <th>Quantity</th>
        <th>Unit Price</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>
      {{ for row in Items }}
      <tr>
        <td>{{ row.Description }}</td>
        <td class="numeric">{{ row.Quantity }}</td>
        <td class="numeric">{{ row.UnitPrice }}</td>
        <td class="numeric">{{ row.Total }}</td>
      </tr>
      {{ end }}
    </tbody>
    <tfoot>
      <tr>
        <td colspan="3">Grand Total</td>
        <td class="numeric">{{ GrandTotal }}</td>
      </tr>
    </tfoot>
  </table>
</body>
</html>
